    <!DOCTYPE html>
    <html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <title>Exemplo de Prompt HTML</title>
    </head>

    <body>
        <h2>Calcular número de roldanas</h2>

        <!-- Campo para o usuário digitar -->
        <label for="peso">Peso atual (N):</label>
        <input type="number" id="peso" placeholder="Digite o peso"><br><br>

        <label for="forca">Força desejada (N):</label>
        <input type="number" id="forca" placeholder="Digite a força"><br><br>

        <!-- Botão para executar -->
        <button id="btnCalcular">Calcular</button>

        <!-- Resultado -->
        <p id="resultado"></p>

        <script type="module" src="src/index.js"></script>
    </body>
